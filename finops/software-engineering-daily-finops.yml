specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Software Engineering Daily
providerId: software-engineering-daily
publisherName: Software Engineering Daily
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Media
  - Podcasts
  - Software Engineering
  - Technical Content
  - Open Source
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Software Engineering Daily API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Software Engineering Daily
  ServiceCategory: Developer Tools / API
  ProviderName: Software Engineering Daily
  PublisherName: Software Engineering Daily
  InvoiceIssuerName: Software Engineering Daily
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Software Engineering Daily Podcast RSS Feed
    baseURL: https://softwareengineeringdaily.com
    tags:
      - Feed
      - Podcasts
      - RSS
      - Syndication
    serviceName: Software Engineering Daily Podcast RSS Feed
    serviceCategory: API
  - name: Software Engineering Daily Backend API
    baseURL: https://softwareengineeringdaily.com
    tags:
      - Episodes
      - Open Source
      - Podcasts
      - REST
    serviceName: Software Engineering Daily Backend API
    serviceCategory: API
  - name: Software Engineering Daily Mobile App
    baseURL: https://softwareengineeringdaily.com
    tags:
      - Mobile
      - iOS
      - Android
      - React Native
      - Open Source
    serviceName: Software Engineering Daily Mobile App
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
